name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt JS-based actions into Node 24 ahead of the GH default flip (June 2026)
  # to surface upstream incompatibility early. Mirrors the krypt / tikr baseline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Mostly Linux: infr is a Vulkan-first engine. `glslc` (shaderc) compiles the
# compute shaders at build time, and the dp4a shaders need a recent glslc
# (GL_EXT_integer_dot_product) — Ubuntu 24.04 ships shaderc 2023.8 which is too
# old, so we pin ubuntu-26.04 (shaderc 2025+). The GPU integration tests are
# #[ignore]'d (they need a real Vulkan device); CI builds + runs the CPU suite.
# ash loads Vulkan at runtime via dlopen, so no libvulkan is needed to build.
# The `test-macos` job additionally builds on Apple Silicon and runs the
# reference Metal backend's parity suite against a real Metal device.

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          cache: false
      - run: rustup update --no-self-update stable
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --locked
      - run: cargo test --doc --workspace --locked

  # CPU generation goldens against REAL models. The `cpu_golden_*` /
  # `cpu_kv_*` tests in `infr-llama/tests/cpu_backend.rs` self-skip when the
  # GGUF isn't in the HF cache (see the `need_model!` macro), so on a bare
  # runner they always no-op — which is exactly how a real arch-correctness bug
  # (the Q8_0 sub-256 truncation that changed gemma-3-1b's output) slipped past
  # CI. This job downloads a SMALL representative set of goldens into the
  # standard HuggingFace hub cache (`~/.cache/huggingface/hub/models--<org>--
  # <repo>/snapshots/<commit>/<file>` — the exact layout `find_gguf` reads),
  # caches them across runs, and runs the CPU suite so those goldens actually
  # execute and their hashes are asserted. Runs in parallel with the other jobs.
  #
  # Model set (Q4_K_M, ~1.7 GB total) — one per distinct architecture family
  # with a CPU golden, deliberately excluding the multi-GB MoE / big models:
  #   unsloth/gemma-3-1b-it-GGUF  (769 MB) — dense SWA/GeGLU, hd=256; the
  #                                          non-256-in_f arch that caught Q8_0
  #   unsloth/Qwen3-0.6B-GGUF     (379 MB) — dense; also drives the cpu_kv_*
  #                                          coherence + quant-sweep tests
  #   unsloth/Qwen3.5-0.8B-GGUF   (508 MB) — gated-DeltaNet (qwen35) golden
  cpu-goldens:
    name: cargo test (CPU goldens, real models)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      # Cache the downloaded GGUFs across runs. The key encodes the exact model
      # set + quant, so it only re-downloads when that list changes (bump the
      # `-v1` suffix if you change the models below).
      - name: Cache golden model GGUFs
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cpu-goldens-gemma3-1b_qwen3-06b_qwen35-08b-q4km-v1
      - name: Download golden GGUFs (single file per repo)
        run: |
          pipx install huggingface_hub
          huggingface-cli download unsloth/gemma-3-1b-it-GGUF gemma-3-1b-it-Q4_K_M.gguf
          huggingface-cli download unsloth/Qwen3-0.6B-GGUF   Qwen3-0.6B-Q4_K_M.gguf
          huggingface-cli download unsloth/Qwen3.5-0.8B-GGUF Qwen3.5-0.8B-Q4_K_M.gguf
      # Release build: these run real CPU inference (the f32 reference backend),
      # which is far too slow to time out in debug. Single-threaded because the
      # goldens mutate process-global generation env under a shared lock.
      - run: cargo test --release -p infr-llama --test cpu_backend --locked -- --test-threads=1

  build:
    name: cargo build --release
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace --locked

  # Cheap Linux guard for the macOS-only `infr-metal` crate: `cargo check`
  # cross-compiled to aarch64-apple-darwin doesn't link, so no macOS SDK is
  # needed — it just typechecks the match arms/tests that the Linux clippy/test
  # jobs skip (they never build `infr-metal`). Catches Op-signature drift before
  # the expensive `test-macos` runner. Drop this job if it ever proves flaky.
  metal-check:
    name: cargo check (infr-metal, Apple target)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: sudo apt-get update && sudo apt-get install -y glslc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
      - run: rustup update --no-self-update stable
      - run: rustup target add aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p infr-metal --all-targets --locked --target aarch64-apple-darwin

  # macOS / Metal: the Linux jobs above never build `infr-metal` (it is
  # `#![cfg(target_os = "macos")]`). This job builds the workspace on an
  # Apple-Silicon runner — which has a real Metal device — and runs the
  # infr-metal parity suite. Those tests are `#[ignore]`d like the Vulkan GPU
  # tests, so they need an explicit `--include-ignored`.
  test-macos:
    name: cargo test (macOS / Metal)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install glslc (shaderc)
        run: brew install shaderc
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked
      - run: cargo test -p infr-metal --locked -- --include-ignored
